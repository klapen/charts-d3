    <style type="text/css">
      #content_info {
        height: 700px;
        margin-bottom: 20px;
      }
      #chart {
        height: inherit;
      }
      <style type="text/css">
      svg {
      border: 1px solid #ccc;
      }
      
      .axis line,
      .axis path {
      shape-rendering: crispEdges;
      fill: transparent;
      stroke: #555;
      }
      .axis text {
      font-size: 9px;
      }
      
      .bar {
      fill-opacity: 0.5;
      }
      .bar.left {
      fill: steelblue;
      }
      .bar.right {
      fill: firebrick;
      }
      .mirror {
      display:block; 
      -webkit-transform: matrix(-1, 0, 0, 1, 0, 0);
      -moz-transform: matrix(-1, 0, 0, 1, 0, 0);
      -o-transform: matrix(-1, 0, 0, 1, 0, 0);
      transform: matrix(-1, 0, 0, 1, 0, 0);
      }
    </style>
