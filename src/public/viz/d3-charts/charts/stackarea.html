<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Stackarea Chart</title>
    <link href="../../css/app.css" rel="stylesheet">
    <script src="http://code.jquery.com/jquery-1.12.0.min.js"></script>
    <script src="https://d3js.org/d3.v4.min.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/stackarea.js"></script>
</head>
<body>
    <nav class="navbar navbar-dark fixed-top bg-dark flex-md-nowrap p-0 shadow">
        <a class="navbar-brand col-sm-3 col-md-2 mr-0" href="../../../index.html">
            <img src="../../../img/klapenlogo-inv.svg" width="30" height="30" alt="Logo Klapen" title="Back to Home">
            <span>KLAPEN</span>
        </a>
    </nav>
    <div class="container-fluid" role="main">
        <div class="row">
            <div class="col-10 offset-1">
                <div class="my-4 w-100 graphic-container area">
                    <div id="stackarea-chart" class="chart"></div>
                </div>
            </div>
        </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', function(event) {
            var stackareaChart = stackarea.generate('stackarea-chart');
            stackarea.loadDataFromFile(stackareaChart,'0','../data/stackarea.csv',function(data){  
                var cols = ['cat1','cat2','cat3','cat4','cat5','cat6','cat7','cat8','cat9'];
                var total = {}
                data.map(function(d){
                    total[d.category] = cols.reduce(function(acc,c){
                        d[c] = +d[c];
                        acc += d[c];
                        return acc
                    },0);
                });

                data.map(function(d){
                    cols.map(function(c){
                        d[c] = d[c]/total[d.category];
                    }) 
                });
                return data;
            });
        });
    </script>
</body>
</html>
