<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Force Chart</title>
    <link href="../../css/app.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-1.12.0.min.js"></script>
    <script src="https://d3js.org/d3.v4.min.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/force.js"></script>
</head>
<body>
    <nav class="navbar navbar-dark fixed-top bg-dark flex-md-nowrap p-0 shadow">
        <a class="navbar-brand col-sm-3 col-md-2 mr-0" href="../../../index.html">
            <img src="../../../img/klapenlogo-inv.svg" width="30" height="30" alt="Logo Klapen" title="Back to Home">
            <span>KLAPEN</span>
        </a>
    </nav>
    <div class="container-fluid" role="main">
        <div class="row">
            <div class="col-10 offset-1">
                <div class="my-4 w-100 graphic-container area">
                    <div id="force-chart" class="chart"></div>
                </div>
            </div>
        </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', function(event) {
            var forceChart = force.generate('force-chart');
            force.loadDataFromFile(forceChart,'range1','../data/planet.csv',function(data){
                data = data.reduce(function(acc,curr){
                    var order_data = data.columns.filter(function(d){
                        return ['id','total','name'].indexOf(d) < 0;
                    }).map(function(c){
                        return {'name':c,'value':+curr[c]}
                    }).sort(function(a,b){return b.value - a.value});
                    acc[curr['name']] = order_data;
                    return acc
                },{'columns':data.columns})
                return data;
            });
        });
    </script>
</body>
</html>
