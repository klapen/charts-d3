<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Barstack Chart</title>
    <link href="../../css/app.css" rel="stylesheet">
    <script src="http://code.jquery.com/jquery-1.12.0.min.js"></script>
    <script src="https://d3js.org/d3.v4.min.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/barstack.js"></script>
</head>
<body>
    <nav class="navbar navbar-dark fixed-top bg-dark flex-md-nowrap p-0 shadow">
        <a class="navbar-brand col-sm-3 col-md-2 mr-0" href="../../../index.html">
            <img src="../../../img/klapenlogo-inv.svg" width="30" height="30" alt="Logo Klapen" title="Back to Home">
            <span>KLAPEN</span>
        </a>
    </nav>
    <div class="container-fluid" role="main">
        <div class="row">
            <div class="col-10 offset-1">
                <div class="my-4 w-100 graphic-container area">
                    <div id="barstack-chart" class="chart"></div>
                </div>
            </div>
        </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', function(event) {
            var barstackChart = barstack.generate('barstack-chart');
            barstack.loadDataFromFile(barstackChart,'0','../data/stackarea.csv',function(data){
                data.map(function(d){
                    d.total = data.columns.reduce(function(a,c){
                        if(c != 'category'){
                            d[c] = +d[c];
                            a += d[c]
                        };
                        return a
                    },0);
                });
                data.map(function(d){
                    data.columns.map(function(c){
                        if(c != 'category') d[c] = d[c]/d.total;
                    })
                    d.total = 1;
                });
                return data;
            });
        });
    </script>
</body>
</html>
