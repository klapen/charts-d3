<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Stackbar Chart</title>
    <link href="../../css/app.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="../css/stackbar.css">
    <script src="http://code.jquery.com/jquery-1.12.0.min.js"></script>
    <script src="http://d3js.org/d3.v4.min.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/stackbar.js"></script>
</head>
<body>
    <nav class="navbar navbar-dark fixed-top bg-dark flex-md-nowrap p-0 shadow">
        <a class="navbar-brand col-sm-3 col-md-2 mr-0" href="../../../index.html">
            <img src="../../../img/klapenlogo-inv.svg" width="30" height="30" alt="Logo Klapen" title="Back to Home">
            <span>KLAPEN</span>
        </a>
    </nav>
    <div class="container-fluid" role="main">
        <div class="row">
            <div class="col-10 offset-1">
                <div class="my-4 w-100 graphic-container">
                    <div id="stckbar" class="chart"></div>
                </div>
            </div>
        </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', function(event) {
            var stckbar = stackbar.generate("stckbar");
            stackbar.loadData(stckbar, [{'name':'cat1','value':0.25},
                                        {'name':'cat2','value':0.25},
                                        {'name':'cat3','value':0.2},
                                        {'name':'cat4','value':0.15},
                                        {'name':'cat5','value':0.15}]);
        });
    </script>
</body>
</html>
