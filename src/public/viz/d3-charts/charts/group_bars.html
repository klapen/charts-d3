<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Group Bars Chart</title>
    <link href="../../css/app.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="../css/group_bars.css">
    <script src="https://code.jquery.com/jquery-1.12.0.min.js"></script>
    <script src="https://d3js.org/d3.v4.min.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/group_bars.js"></script>
</head>
<body>
    <nav class="navbar navbar-dark fixed-top bg-dark flex-md-nowrap p-0 shadow">
        <a class="navbar-brand col-sm-3 col-md-2 mr-0" href="../../../index.html">
            <img src="../../../img/klapenlogo-inv.svg" width="30" height="30" alt="Logo Klapen" title="Back to Home">
            <span>KLAPEN</span>
        </a>
    </nav>
    <div class="container-fluid" role="main">
        <div class="row">
            <div class="col-10 offset-1">
                <div class="my-4 w-100 graphic-container">
                    <div id="group-bars-chart" class="chart"></div>
                </div>
            </div>
        </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', function(event) {
            var gbars = group_bars.generate('group-bars-chart');
            group_bars.loadData(gbars,[{'name':'Convocados','value':{'rol1':4,'rol2':5}},
                                       {'name':'Inscritos','value':{'rol1':4,'rol2':5}},
                                       {'name':'Requeridos','value':{'rol1':1,'rol2':2}}
                                      ]);
        });
    </script>
</body>
</html>
