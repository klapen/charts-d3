<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IPC weights · Klapen</title>
    <meta name="description" content="Colombia Consumer Price Index (IPC) basket weights — Base 2005" />
    <link rel="icon" href="/img/klapenlogo.svg" />
  </head>
  <body class="bg-neutral-950 text-neutral-100 min-h-screen antialiased">
    <a href="#chart" class="sr-only focus:not-sr-only focus:absolute focus:top-2 focus:left-2 focus:bg-brand focus:text-white focus:px-3 focus:py-1 focus:rounded">Skip to chart</a>

    <header class="border-b border-neutral-800">
      <div class="max-w-6xl mx-auto px-6 py-6 flex items-center justify-between gap-4">
        <a href="/" class="flex items-center gap-3 text-neutral-300 hover:text-white transition-colors">
          <span aria-hidden="true">←</span>
          <span data-en="Back to gallery" data-es="Volver a la galería">Back to gallery</span>
        </a>
        <div class="flex items-center gap-1 text-sm" role="group" aria-label="Language">
          <button data-lang="en" class="lang-btn px-2 py-1 rounded cursor-pointer" aria-pressed="false">EN</button>
          <span class="text-neutral-700" aria-hidden="true">·</span>
          <button data-lang="es" class="lang-btn px-2 py-1 rounded cursor-pointer" aria-pressed="false">ES</button>
        </div>
      </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 py-10">
      <h1 class="text-3xl font-bold tracking-tight"
          data-en="IPC basket weights"
          data-es="Ponderación del IPC">Ponderación del IPC</h1>
      <p class="text-neutral-400 mt-2"
         data-en="National total · Base 2005 · DANE"
         data-es="Total nacional · Base 2005 · DANE">
        Total nacional · Base 2005 · DANE
      </p>
      <p class="mt-3 text-sm text-neutral-400"
         data-en="Click a slice to zoom in, click the center to zoom out. Hover to inspect."
         data-es="Haz clic en una porción para acercar, en el centro para alejar. Pasa el cursor para inspeccionar.">
        Haz clic en una porción para acercar, en el centro para alejar. Pasa el cursor para inspeccionar.
      </p>

      <div id="breadcrumb" class="mt-6 flex flex-wrap items-center gap-2 text-sm min-h-[2rem]" aria-live="polite"></div>

      <div class="mt-2 grid grid-cols-1 lg:grid-cols-[1fr_220px] gap-8 items-start">
        <div id="chart" class="relative" role="img" aria-label="IPC basket sunburst"></div>

        <aside class="bg-neutral-900 border border-neutral-800 rounded-lg p-4">
          <h2 class="text-sm font-semibold text-neutral-300"
              data-en="Expense groups"
              data-es="Grupos de gasto">Grupos de gasto</h2>
          <ul id="legend" class="mt-3 space-y-1.5 text-xs"></ul>
        </aside>
      </div>

      <p class="mt-10 text-xs text-neutral-500">
        <span data-en="Source:" data-es="Fuente:">Fuente:</span>
        <a class="underline decoration-neutral-700 hover:decoration-brand"
           href="https://www.dane.gov.co/" target="_blank" rel="noopener">
          DANE — Índice de Precios al Consumidor, Base 2005
        </a>
      </p>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
