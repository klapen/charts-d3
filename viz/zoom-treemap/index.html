<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zoom treemap · Klapen</title>
    <meta name="description" content="Zoomable hierarchical treemap of the Flare class library" />
    <link rel="icon" href="/img/klapenlogo.svg" />
  </head>
  <body class="bg-neutral-950 text-neutral-100 min-h-screen antialiased">
    <a href="#chart" class="sr-only focus:not-sr-only focus:absolute focus:top-2 focus:left-2 focus:bg-brand focus:text-white focus:px-3 focus:py-1 focus:rounded">Skip to chart</a>

    <header class="border-b border-neutral-800">
      <div class="max-w-6xl mx-auto px-6 py-6 flex items-center justify-between gap-4">
        <a href="/" class="flex items-center gap-3 text-neutral-300 hover:text-white transition-colors">
          <span aria-hidden="true">←</span>
          <span data-en="Back to gallery" data-es="Volver a la galería">Back to gallery</span>
        </a>
        <div class="flex items-center gap-1 text-sm" role="group" aria-label="Language">
          <button data-lang="en" class="lang-btn px-2 py-1 rounded cursor-pointer" aria-pressed="false">EN</button>
          <span class="text-neutral-700" aria-hidden="true">·</span>
          <button data-lang="es" class="lang-btn px-2 py-1 rounded cursor-pointer" aria-pressed="false">ES</button>
        </div>
      </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 py-10">
      <h1 class="text-3xl font-bold tracking-tight"
          data-en="Zoomable treemap"
          data-es="Treemap con zoom">Zoomable treemap</h1>
      <p class="text-neutral-400 mt-2"
         data-en="Click a cell to zoom in to its parent group · click the background to reset"
         data-es="Haz clic en una celda para acercarte a su grupo · clic en el fondo para reiniciar">
        Click a cell to zoom in to its parent group · click the background to reset
      </p>

      <div class="mt-8 flex items-center gap-3">
        <label class="text-sm text-neutral-400" for="value-mode"
               data-en="Size by:" data-es="Tamaño según:">Size by:</label>
        <select id="value-mode"
                class="bg-neutral-900 border border-neutral-700 text-neutral-100 text-sm rounded px-2 py-1 focus:border-brand focus:outline-none">
          <option value="size" data-en="File size" data-es="Tamaño">File size</option>
          <option value="count" data-en="Number of items" data-es="Cantidad de elementos">Number of items</option>
        </select>
        <button id="reset-btn"
                class="ml-auto text-sm text-neutral-400 hover:text-brand cursor-pointer transition-colors"
                data-en="Reset zoom" data-es="Reiniciar zoom">Reset zoom</button>
      </div>

      <div id="breadcrumb" class="mt-4 text-sm text-neutral-500"></div>

      <div id="chart" class="mt-4 rounded border border-neutral-800 bg-neutral-950"
           role="img" aria-label="Treemap"></div>

      <p class="mt-6 text-xs text-neutral-500">
        <span data-en="Source:" data-es="Fuente:">Source:</span>
        <a class="underline decoration-neutral-700 hover:decoration-brand"
           href="https://github.com/d3/d3-hierarchy" target="_blank" rel="noopener">
          Flare class library — d3-hierarchy sample dataset
        </a>
      </p>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
