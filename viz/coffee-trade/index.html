<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Klapen · Coffee Trade</title>
    <meta name="description" content="Animated global coffee trade flows, 2015–2023." />
    <link rel="icon" href="/img/klapenlogo.svg" />
  </head>
  <body class="bg-neutral-950 text-neutral-100 min-h-screen antialiased">
    <a href="#chart" class="sr-only focus:not-sr-only focus:absolute focus:top-2 focus:left-2 focus:bg-brand focus:text-white focus:px-3 focus:py-1 focus:rounded">Skip to chart</a>

    <header class="border-b border-neutral-800">
      <div class="max-w-6xl mx-auto px-6 py-6 flex items-start justify-between gap-4">
        <div>
          <a href="/" class="text-sm text-neutral-400 hover:text-brand inline-flex items-center gap-2">
            <span aria-hidden="true">←</span>
            <span data-en="Back to gallery" data-es="Volver a la galería">Back to gallery</span>
          </a>
          <h1 class="text-2xl font-bold tracking-tight mt-2"
              data-en="Global coffee trade" data-es="Comercio global de café">Global coffee trade</h1>
          <p class="text-neutral-400 text-sm mt-1"
             data-en="Animated trade flows from UN Comtrade"
             data-es="Flujos comerciales animados — Comtrade de la ONU">
             Animated trade flows from UN Comtrade
          </p>
        </div>
        <div class="flex items-center gap-1 text-sm" role="group" aria-label="Language">
          <button data-lang="en" class="lang-btn px-2 py-1 rounded cursor-pointer" aria-pressed="false">EN</button>
          <span class="text-neutral-700" aria-hidden="true">·</span>
          <button data-lang="es" class="lang-btn px-2 py-1 rounded cursor-pointer" aria-pressed="false">ES</button>
        </div>
      </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 py-6">
      <div class="grid gap-4 lg:grid-cols-3">
        <div class="lg:col-span-2 min-w-0">
          <div id="chart" role="img" aria-label="Global coffee trade flows"
               class="relative w-full rounded-xl border border-neutral-800 bg-neutral-950 overflow-hidden">
            <!-- SVG + Canvas inserted here by main.js -->
            <div class="absolute top-2 right-2 z-10 flex flex-col gap-1" role="group" aria-label="Zoom controls">
              <button id="zoom-in" type="button"
                      class="w-7 h-7 grid place-items-center rounded border border-neutral-700 bg-neutral-900/80 text-neutral-200 hover:border-brand hover:text-neutral-50 text-base leading-none"
                      aria-label="Zoom in">+</button>
              <button id="zoom-out" type="button"
                      class="w-7 h-7 grid place-items-center rounded border border-neutral-700 bg-neutral-900/80 text-neutral-200 hover:border-brand hover:text-neutral-50 text-base leading-none"
                      aria-label="Zoom out">−</button>
              <button id="zoom-reset" type="button"
                      class="w-7 h-7 grid place-items-center rounded border border-neutral-700 bg-neutral-900/80 text-neutral-200 hover:border-brand hover:text-neutral-50 text-xs leading-none"
                      aria-label="Reset zoom">⟲</button>
            </div>
          </div>

          <div id="controls" class="mt-4 flex flex-wrap items-center gap-4">
            <button id="play-btn" type="button" aria-pressed="false"
                    class="shrink-0 px-3 py-1 rounded border border-neutral-700 bg-neutral-900 text-sm hover:border-brand"
                    data-en="Play" data-es="Reproducir">Play</button>

            <div class="basis-full sm:basis-auto flex-1 min-w-[160px] flex items-center gap-2">
              <input id="year-slider" type="range" min="0" max="0" step="1" value="0"
                     aria-label="Year"
                     class="flex-1 accent-brand cursor-pointer" />
              <output id="year-label" for="year-slider" class="text-sm tabular-nums text-neutral-300 w-12 text-right">—</output>
            </div>

            <select id="type-select" aria-label="Coffee type"
                    class="shrink-0 px-2 py-1 rounded border border-neutral-700 bg-neutral-900 text-sm">
              <option value="all" data-en="All coffee" data-es="Todo el café">All coffee</option>
              <option value="green" data-en="Green" data-es="Verde">Green</option>
              <option value="roasted" data-en="Roasted" data-es="Tostado">Roasted</option>
            </select>
          </div>

          <div class="mt-2 flex flex-wrap items-center gap-3 text-xs">
            <span class="text-neutral-500" data-en="Detail:" data-es="Detalle:">Detail:</span>
            <button data-tier="top" class="tier-btn px-2 py-1 rounded border border-neutral-700 bg-neutral-900 hover:border-brand"
                    data-en="Top flows" data-es="Flujos principales">Top flows</button>
            <button data-tier="full" class="tier-btn px-2 py-1 rounded border border-neutral-700 bg-neutral-900 hover:border-brand"
                    data-en="All countries" data-es="Todos los países">All countries</button>
          </div>

          <div class="mt-2 flex flex-wrap items-center gap-3 text-xs" role="group" aria-label="Flow direction">
            <span class="text-neutral-500" data-en="Flow:" data-es="Flujo:">Flow:</span>
            <button data-flow="both" class="flow-btn px-2 py-1 rounded border border-neutral-700 bg-neutral-900 hover:border-brand"
                    aria-pressed="true"
                    data-en="All" data-es="Todo">All</button>
            <button data-flow="exports" class="flow-btn px-2 py-1 rounded border border-neutral-700 bg-neutral-900 hover:border-brand"
                    aria-pressed="false"
                    data-en="Exports" data-es="Exportaciones">Exports</button>
            <button data-flow="imports" class="flow-btn px-2 py-1 rounded border border-neutral-700 bg-neutral-900 hover:border-brand"
                    aria-pressed="false"
                    data-en="Imports" data-es="Importaciones">Imports</button>

            <button id="clear-filters-btn" type="button"
                    class="ml-auto px-2 py-1 rounded border border-neutral-700 bg-neutral-900 text-neutral-400 hover:text-neutral-100 hover:border-brand"
                    data-en="Clear all" data-es="Limpiar todo">Clear all</button>
          </div>

          <ul id="legend" class="mt-4 flex flex-wrap gap-3 text-xs text-neutral-400"></ul>
        </div>

        <aside id="info-panel"
               class="rounded-xl border border-neutral-800 bg-neutral-900/60 p-4 text-sm lg:sticky lg:top-4 lg:self-start"
               aria-live="polite">
          <p class="text-neutral-500"
             data-en="Loading summary…" data-es="Cargando resumen…">Loading summary…</p>
        </aside>
      </div>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
